services:
  openclaw-dashboard:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
    volumes:
      # 只读挂载 OpenClaw 目录（用于读取日志和状态）
      - /root/.openclaw:/root/.openclaw:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID

networks:
  default:
    driver: bridge
